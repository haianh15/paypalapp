<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luyện Đề - PayPal Math</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="practice-page">

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🧮</span>
        <span class="logo-text">PayPal <span class="logo-accent">Math</span></span>
      </div>
      <nav class="nav">
        <a href="index.html" class="nav-link">🏠 Trang chủ</a>
        <a href="history.html" class="nav-link">📋 Lịch sử</a>
      </nav>
    </div>
  </header>

  <!-- Progress Bar -->
  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-info">
      <span id="progressText">Câu 1 / 20</span>
      <span id="timerText">⏱ 00:00</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <main class="practice-main">

    <!-- Quiz Area -->
    <div id="quizArea" class="quiz-area">
      <div class="question-card" id="questionCard">
        <div class="question-number" id="questionNumber">Câu 1</div>
        <div class="question-text" id="questionText">Đang tải...</div>
        <div class="options-grid" id="optionsGrid"></div>
      </div>

      <div class="quiz-nav">
        <button class="btn btn--outline" id="prevBtn" onclick="prevQuestion()" disabled>← Câu trước</button>
        <div class="dot-nav" id="dotNav"></div>
        <button class="btn btn--primary" id="nextBtn">Câu tiếp →</button>
      </div>
    </div>

    <!-- Result Area -->
    <div id="resultArea" class="result-area hidden">
      <div class="result-card">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <h2 class="result-title" id="resultTitle">Hoàn thành!</h2>
        <div class="result-score-big" id="resultScoreBig">0%</div>
        <div class="result-stats">
          <div class="result-stat">
            <span class="result-stat-icon">✅</span>
            <span id="correctCount">0</span> đúng
          </div>
          <div class="result-stat">
            <span class="result-stat-icon">❌</span>
            <span id="wrongCount">0</span> sai
          </div>
          <div class="result-stat">
            <span class="result-stat-icon">⏭</span>
            <span id="skipCount">0</span> bỏ qua
          </div>
        </div>
        <div class="result-time">⏱ Thời gian: <strong id="totalTime">00:00</strong></div>
        <div class="result-message" id="resultMessage"></div>
        <!-- Trang thai luu Firebase -->
        <div class="save-status" id="saveStatus"></div>

        <div class="result-actions">
          <button class="btn btn--outline" onclick="reviewAnswers()">🔍 Xem lại đáp án</button>
          <a href="index.html" class="btn btn--primary">🏠 Về trang chủ</a>
          <button class="btn btn--accent" id="retryBtn" onclick="retryQuiz()">🔄 Làm lại</button>
        </div>
      </div>
    </div>

    <!-- Review Area -->
    <div id="reviewArea" class="review-area hidden">
      <div class="review-header">
        <h2>🔍 Xem lại đáp án</h2>
        <button class="btn btn--outline" onclick="backToResult()">← Quay lại kết quả</button>
      </div>
      <div id="reviewList" class="review-list"></div>
    </div>

  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="js/questions.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/history.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
